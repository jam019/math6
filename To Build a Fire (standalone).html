a .body p{font-size:1.5rem;line-height:1.7;margin:0 0 1rem}\n  .mathset .para .body p:last-child{margin-bottom:0}\n  .mathset .para .body ul{margin:.2rem 0 1rem 1.6rem;font-size:1.5rem;line-height:1.7}\n  .mathset .para .body li{margin:.5rem 0;padding-left:.3rem}\n  .subpart{display:flex;gap:.8rem;margin:1.6rem 0 0}\n  .subpart .let{flex:0 0 auto;font-weight:bold;font-size:1.5rem;line-height:1.7}\n  .subpart .subbody{flex:1;min-width:0}\n  .subpart .subbody p{margin:0}\n  .solline{display:flex;align-items:flex-end;gap:1rem;margin:1.3rem 0 .2rem}\n  .sollbl{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.14em;font-weight:bold;color:var(--muted)}\n  .solrule{flex:1;border-bottom:1.5px solid var(--line);height:2.4rem}\n\n  /* ---------- figures ---------- */\n  .figure{width:fit-content;max-width:100%;margin:.4rem auto 2.4rem;border:1px solid var(--line);border-radius:16px;background:#fff;padding:.7rem;cursor:zoom-in;transition:box-shadow .2s ease,transform .2s ease}\n  .figure:hover{box-shadow:0 10px 26px rgba(0,0,0,.12);transform:translateY(-2px)}\n  .figure img{display:block;width:auto;max-width:100%;height:auto;max-height:340px;border-radius:10px;background:#fff}\n  .figcap{font-family:'Courier New',monospace;font-size:12px;letter-spacing:.05em;color:var(--muted);margin-top:.7rem;text-align:center}\n\n  /* ---------- lightbox (pop-out card) ---------- */\n  .lightbox{position:fixed;inset:0;z-index:120;display:none;align-items:center;justify-content:center;background:rgba(22,20,15,.6);padding:2rem}\n  .lightbox.open{display:flex}\n  .lightcard{position:relative;background:#fff;border:1px solid var(--line);border-radius:18px;padding:1rem;max-width:min(940px,94vw);max-height:92vh;box-shadow:0 30px 80px rgba(0,0,0,.45);display:flex;flex-direction:column;transform:scale(.88);opacity:0;transition:transform .3s cubic-bezier(.2,.9,.3,1.25),opacity .25s ease}\n  .lightbox.open .lightcard{transform:scale(1);opacity:1}\n  .lightcard img{display:block;max-width:100%;max-height:78vh;object-fit:contain;border-radius:10px}\n  .lightcard figcaption{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.05em;color:var(--muted);text-align:center;margin-top:.9rem}\n  .lightclose{position:absolute;top:-16px;right:-16px;width:42px;height:42px;border-radius:50%;background:var(--ink);color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.3)}\n\n  /* ---------- vocabulary popover ---------- */\n  .pop{position:absolute;z-index:90;max-width:400px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:1.2rem 1.4rem;box-shadow:0 14px 36px rgba(0,0,0,.18);font-family:Georgia,serif;font-size:1.3rem;line-height:1.5;display:none}\n  .pop .word{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem;color:var(--term)}\n  .pop .x{float:right;cursor:pointer;color:var(--muted);font-family:sans-serif;margin-left:.6rem;font-size:1.2rem;line-height:1}\n\n  /* ---------- focus + motion polish ---------- */\n  .pacer-btn:focus-visible,.read-q:focus-visible,.pacedock button:focus-visible,.term:focus-visible,.pop .x:focus-visible,.psgnav button:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:8px}\n  .toggle button:focus-visible{outline:2px solid var(--accent);outline-offset:-3px}\n  h1,.read-q{text-wrap:balance}\n  .lede,.para .body{text-wrap:pretty}\n  @media (prefers-reduced-motion: reduce){\n    *{animation-duration:.001ms !important;transition-duration:.001ms !important}\n    html{scroll-behavior:auto !important}\n    .para{opacity:1 !important;transform:none !important}\n  }\n  @media(max-width:620px){\n    .para .body{font-size:1.5rem}\n    .num{width:38px;height:38px;font-size:14px}\n    .r-bar{padding:.7rem 1rem}\n    .psgname{min-width:108px}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body class=\"lang-en\">\n\n  \n\n  <div class=\"progress-track\"><div class=\"progress\" id=\"prog\"><\u002Fdiv><\u002Fdiv>\n\n  <!-- ===================== TOP BAR ===================== -->\n  <div class=\"r-bar\">\n    <div class=\"bar-left\">\n      <span class=\"kicker\"><span class=\"en\">Math · To Build a Fire<\u002Fspan><span class=\"es\">Matemáticas · To Build a Fire<\u002Fspan><\u002Fspan>\n      <button class=\"losc-pill\" id=\"loscPill\" onclick=\"toggleLOSC()\" aria-expanded=\"false\">LOSC <span class=\"car\">▾<\u002Fspan><\u002Fbutton>\n      <div class=\"losc-pop\" id=\"loscPop\">\n        <div class=\"losc-sec\">\n          <div class=\"losc-h\"><span class=\"en\">Learning Objective<\u002Fspan><span class=\"es\">Objetivo de aprendizaje<\u002Fspan><\u002Fdiv>\n          <div class=\"losc-ed\"><span class=\"en\">SWBAT read “To Build a Fire” and use the story’s sub-zero details to plot and compare negative numbers, write and interpret inequalities, reason about absolute value, and find distance on the coordinate plane, correctly solving all 3 problems and showing their work.<\u002Fspan><span class=\"es\">Los estudiantes podrán leer “To Build a Fire” y usar los detalles bajo cero del cuento para ubicar y comparar números negativos, escribir e interpretar desigualdades, razonar sobre el valor absoluto y hallar distancias en el plano de coordenadas, resolviendo correctamente los 3 problemas y mostrando su trabajo.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"losc-sec\">\n          <div class=\"losc-h\"><span class=\"en\">Success Criteria<\u002Fspan><span class=\"es\">Criterios de logro<\u002Fspan><\u002Fdiv>\n          <div class=\"losc-ed\"><span class=\"en\">I am successful when I can: (1) restate one detail from “To Build a Fire” in my own words; (2) plot points and label them accurately; (3) write each inequality with the correct symbol and explain what it means; and (4) label each final answer with correct units (°F, °C, or miles).<\u002Fspan><span class=\"es\">Tengo éxito cuando puedo: (1) reformular un detalle de “To Build a Fire” con mis propias palabras; (2) ubicar puntos y etiquetarlos con precisión; (3) escribir cada desigualdad con el símbolo correcto y explicar qué significa; y (4) etiquetar cada respuesta final con las unidades correctas (°F, °C o millas).<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"bar-right\">\n      <div class=\"psgnav\" role=\"group\" aria-label=\"Passage selector\">\n        <button id=\"psgprev\" onclick=\"prevPassage()\" aria-label=\"Previous passage\">‹<\u002Fbutton>\n        <span class=\"psgname\" id=\"psgname\"><\u002Fspan>\n        <button id=\"psgnext\" onclick=\"nextPassage()\" aria-label=\"Next passage\">›<\u002Fbutton>\n      <\u002Fdiv>\n      <button id=\"pacertoggle\" class=\"pacer-btn off\" onclick=\"togglePacer()\">▸ <span class=\"en\">Reading Pacer<\u002Fspan><span class=\"es\">Marcapasos<\u002Fspan><\u002Fbutton>\n      <div class=\"toggle\" role=\"group\" aria-label=\"Language\">\n        <button id=\"btn-en\" class=\"on\" onclick=\"setLang('en')\">EN<\u002Fbutton>\n        <button id=\"btn-es\" onclick=\"setLang('es')\">ES<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"wrap\">\n\n    <!-- ============================================================= -->\n    <!-- PASSAGE 1 — PHYSICAL EROSION                                   -->\n    <!-- ============================================================= -->\n    <section class=\"psg active\" data-id=\"fire\">\n      <div class=\"r-header\">\n        <div class=\"eyebrow\"><span class=\"en\">Literacy Connection · Fiction<\u002Fspan><span class=\"es\">Conexión literaria · Ficción<\u002Fspan><\u002Fdiv>\n        <h1>\n          <span class=\"en\">from “To Build a <span class=\"hl\">Fire<\u002Fspan>”<\u002Fspan>\n          <span class=\"es\">de “To Build a <span class=\"hl\">Fire<\u002Fspan>”<\u002Fspan>\n        <\u002Fh1>\n        <div class=\"lede\"><span class=\"en\">by Jack London<\u002Fspan><span class=\"es\">por Jack London<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"passage\">\n        <div class=\"para\">\n          <div class=\"num\">1<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">The man flung a look back along the way he had come.<\u002Fspan> <span class=\"s\">The Yukon lay a mile wide and hidden under three feet of ice.<\u002Fspan> <span class=\"s\">On top of this ice were as many feet of snow. . . .<\u002Fspan> <span class=\"s\">North and south, as far as his eye could see, it was unbroken white, save for a dark hair-line that curved and twisted from around the spruce-covered island to the south, and that curved and twisted away into the north, where it disappeared behind another spruce-covered island. . . .<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">El hombre lanzó una mirada atrás, por el camino que había recorrido.<\u002Fspan> <span class=\"s\">El Yukón se extendía una milla de ancho, oculto bajo tres pies de hielo.<\u002Fspan> <span class=\"s\">Sobre este hielo había otros tantos pies de nieve. . . .<\u002Fspan> <span class=\"s\">Al norte y al sur, hasta donde alcanzaba su vista, todo era un blanco ininterrumpido, salvo por una oscura línea fina como un cabello que se curvaba y serpenteaba alrededor de la isla cubierta de abetos al sur, y que se curvaba y serpenteaba hacia el norte, donde desaparecía detrás de otra isla cubierta de abetos. . . .<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">2<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">But all this . . . made no impression on the man.<\u002Fspan> <span class=\"s\">It was not because he was long used to it.<\u002Fspan> <span class=\"s\">He was a new-comer in the land . . . and this was his first winter.<\u002Fspan> <span class=\"s\">The trouble with him was that he was without imagination. . . .<\u002Fspan> <span class=\"s\">Fifty degrees below zero was to him just precisely fifty degrees below zero.<\u002Fspan> <span class=\"s\">That there should be anything more to it than that was a thought that never entered his head. . . .<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Pero todo esto . . . no causó ninguna impresión en el hombre.<\u002Fspan> <span class=\"s\">No era porque estuviera acostumbrado desde hacía mucho.<\u002Fspan> <span class=\"s\">Era un recién llegado a la región . . . y este era su primer invierno.<\u002Fspan> <span class=\"s\">Su problema era que carecía de imaginación. . . .<\u002Fspan> <span class=\"s\">Cincuenta grados bajo cero eran para él precisamente cincuenta grados bajo cero.<\u002Fspan> <span class=\"s\">Que pudiera haber algo más en ello era un pensamiento que jamás pasó por su cabeza. . . .<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">3<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">At the man’s heels trotted a dog, a big native husky. . . .<\u002Fspan> <span class=\"s\">The animal was depressed by the tremendous cold.<\u002Fspan> <span class=\"s\">It knew that it was no time for travelling.<\u002Fspan> <span class=\"s\">Its instinct told it a truer tale than was told to the man by the man’s judgment. . . .<\u002Fspan> <span class=\"s\">The dog had learned fire, and it wanted fire. . . .<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">A los talones del hombre trotaba un perro, un gran husky nativo. . . .<\u002Fspan> <span class=\"s\">El animal estaba deprimido por el tremendo frío.<\u002Fspan> <span class=\"s\">Sabía que no era momento de viajar.<\u002Fspan> <span class=\"s\">Su instinto le contaba una historia más veraz que la que el juicio del hombre le contaba a él. . . .<\u002Fspan> <span class=\"s\">El perro había aprendido lo que era el fuego, y quería fuego. . . .<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">4<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Empty as the man’s mind was of thoughts, he was keenly observant, and he noticed the changes in the creek, the curves and bends and timber-jams, and always he sharply noted where he placed his feet. . . .<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Por vacía de pensamientos que estuviera la mente del hombre, él era sumamente observador, y notaba los cambios en el arroyo, las curvas y los recodos y las acumulaciones de troncos, y siempre advertía con cuidado dónde ponía los pies. . . .<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">5<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">And then it happened.<\u002Fspan> <span class=\"s\">At a place where there were no signs, where the soft, unbroken snow seemed to advertise solidity beneath, the man broke through.<\u002Fspan> <span class=\"s\">It was not deep.<\u002Fspan> <span class=\"s\">He wetted himself half-way to the knees before he floundered out to the firm crust.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Y entonces sucedió.<\u002Fspan> <span class=\"s\">En un lugar donde no había señales, donde la nieve blanda e intacta parecía anunciar solidez por debajo, el hombre se hundió.<\u002Fspan> <span class=\"s\">No era profundo.<\u002Fspan> <span class=\"s\">Se mojó hasta media pierna antes de salir con dificultad a la costra firme.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">6<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">He was angry, and cursed his luck aloud . . . . for he would have to build a fire and dry out his foot-gear.<\u002Fspan> <span class=\"s\">This was imperative at that low temperature—he knew that much; and he turned aside to the bank, which he climbed.<\u002Fspan> <span class=\"s\">On top, tangled in the underbrush about the trunks of several small spruce trees, was a high-water deposit of dry firewood. . . .<\u002Fspan> <span class=\"s\">He threw down several large pieces on top of the snow. . . .<\u002Fspan> <span class=\"s\">The flame he got by touching a match to a small shred of birch-bark that he took from his pocket. . . .<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Estaba enojado, y maldijo su suerte en voz alta . . . . pues tendría que encender un fuego y secar su calzado.<\u002Fspan> <span class=\"s\">Esto era imprescindible a tan baja temperatura—eso lo sabía; y se desvió hacia la orilla, que escaló.<\u002Fspan> <span class=\"s\">Arriba, enredado en la maleza alrededor de los troncos de varios abetos pequeños, había un depósito de leña seca dejado por la crecida. . . .<\u002Fspan> <span class=\"s\">Arrojó varios trozos grandes sobre la nieve. . . .<\u002Fspan> <span class=\"s\">La llama la obtuvo acercando un fósforo a un pequeño trozo de corteza de abedul que sacó de su bolsillo. . . .<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">7<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">He worked slowly and carefully, keenly aware of his danger.<\u002Fspan> <span class=\"s\">Gradually, as the flame grew stronger, he increased the size of the twigs with which he fed it.<\u002Fspan> <span class=\"s\">He squatted in the snow, pulling the twigs out from their entanglement in the brush and feeding directly to the flame.<\u002Fspan> <span class=\"s\">He knew there must be no failure.<\u002Fspan> <span class=\"s\">When it is seventy-five below zero, a man must not fail in his first attempt to build a fire—that is, if his feet are wet. . . .<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Trabajó lenta y cuidadosamente, muy consciente de su peligro.<\u002Fspan> <span class=\"s\">Poco a poco, a medida que la llama se hacía más fuerte, fue aumentando el tamaño de las ramitas con que la alimentaba.<\u002Fspan> <span class=\"s\">Se puso en cuclillas en la nieve, sacando las ramitas de su enredo en la maleza y alimentándolas directamente a la llama.<\u002Fspan> <span class=\"s\">Sabía que no debía haber ningún fracaso.<\u002Fspan> <span class=\"s\">Cuando se está a setenta y cinco bajo cero, un hombre no debe fallar en su primer intento de encender un fuego—es decir, si tiene los pies mojados. . . .<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">8<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">There was the fire, snapping and crackling and promising life with every dancing flame.<\u002Fspan> <span class=\"s\">He started to untie his moccasins.<\u002Fspan> <span class=\"s\">They were coated with ice; the thick German socks were like sheaths of iron half-way to the knees; and the moccasin strings were like rods of steel all twisted and knotted. . . .<\u002Fspan> <span class=\"s\">For a moment he tugged with his numbed fingers, then, realizing the folly of it, he drew his sheath-knife.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Allí estaba el fuego, chisporroteando y crepitando y prometiendo vida con cada llama danzante.<\u002Fspan> <span class=\"s\">Empezó a desatar sus mocasines.<\u002Fspan> <span class=\"s\">Estaban cubiertos de hielo; los gruesos calcetines alemanes eran como fundas de hierro hasta media pierna; y los cordones de los mocasines eran como varillas de acero, todos torcidos y anudados. . . .<\u002Fspan> <span class=\"s\">Por un momento tiró de ellos con sus dedos entumecidos, luego, dándose cuenta de la insensatez de ello, sacó su cuchillo de vaina.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">9<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">But before he could cut the strings, it happened.<\u002Fspan> <span class=\"s\">It was his own fault or, rather, his mistake.<\u002Fspan> <span class=\"s\">He should not have built the fire under the spruce tree. . . .<\u002Fspan> <span class=\"s\">Now the tree under which he had done this carried a weight of snow on its boughs. . . .<\u002Fspan> <span class=\"s\">It grew like an avalanche, and it descended without warning upon the man and the fire, and the fire was blotted out!<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Pero antes de que pudiera cortar los cordones, sucedió.<\u002Fspan> <span class=\"s\">Fue su propia culpa o, más bien, su error.<\u002Fspan> <span class=\"s\">No debería haber encendido el fuego bajo el abeto. . . .<\u002Fspan> <span class=\"s\">Ahora el árbol bajo el cual lo había hecho cargaba un peso de nieve en sus ramas. . . .<\u002Fspan> <span class=\"s\">Creció como una avalancha, y descendió sin previo aviso sobre el hombre y el fuego, ¡y el fuego quedó apagado!<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================= -->\n    <!-- PASSAGE 2 — MATH LITERACY CONNECTION (display only)            -->\n    <!-- ============================================================= -->\n    <section class=\"psg\" data-id=\"math\">\n      <div class=\"r-header\">\n        <div class=\"eyebrow\"><span class=\"en\">Math Literacy Connection · Unit 6<\u002Fspan><span class=\"es\">Conexión matemática · Unidad 6<\u002Fspan><\u002Fdiv>\n        <h1>\n          <span class=\"en\">To Build a <span class=\"hl\">Fire<\u002Fspan><\u002Fspan>\n          <span class=\"es\">To Build a <span class=\"hl\">Fire<\u002Fspan><\u002Fspan>\n        <\u002Fh1>\n        <div class=\"lede\"><span class=\"en\">Absolute Value, Inequalities, and the Coordinate Plane<\u002Fspan><span class=\"es\">Valor absoluto, desigualdades y el plano de coordenadas<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"passage mathset\">\n        <p class=\"m-instr\"><span class=\"arw\">➤<\u002Fspan> <strong><span class=\"en\">Solve each problem. Show your work.<\u002Fspan><span class=\"es\">Resuelve cada problema. Muestra tu trabajo.<\u002Fspan><\u002Fstrong><\u002Fp>\n\n        <div class=\"para\">\n          <div class=\"num\">1<\u002Fdiv>\n          <div class=\"body\">\n            <p><span class=\"en\">In “To Build a Fire,” the temperature ranges between −50°F and −75°F.<\u002Fspan><span class=\"es\">En “To Build a Fire”, la temperatura varía entre −50°F y −75°F.<\u002Fspan><\u002Fp>\n            <div class=\"subpart\">\n              <span class=\"let\">a.<\u002Fspan>\n              <div class=\"subbody\">\n                <p><span class=\"en\">Plot and label the values −50 and −75 on a number line.<\u002Fspan><span class=\"es\">Ubica y etiqueta los valores −50 y −75 en una recta numérica.<\u002Fspan><\u002Fp>\n                <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"subpart\">\n              <span class=\"let\">b.<\u002Fspan>\n              <div class=\"subbody\">\n                <p><span class=\"en\">Write an inequality using &lt; or &gt; to compare the temperatures. Then interpret the inequality.<\u002Fspan><span class=\"es\">Escribe una desigualdad usando &lt; o &gt; para comparar las temperaturas. Luego interpreta la desigualdad.<\u002Fspan><\u002Fp>\n                <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"subpart\">\n              <span class=\"let\">c.<\u002Fspan>\n              <div class=\"subbody\">\n                <p><span class=\"en\">Which value has a greater absolute value, −50 or −75? Explain how you know.<\u002Fspan><span class=\"es\">¿Cuál valor tiene mayor valor absoluto, −50 o −75? Explica cómo lo sabes.<\u002Fspan><\u002Fp>\n                <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">2<\u002Fdiv>\n          <div class=\"body\">\n            <p><span class=\"en\">The <em>flashpoint<\u002Fem> of firewood is the lowest temperature at which it will burn. The flashpoint of firewood is 300°C. Graph an inequality to represent all the temperatures at which firewood will burn. Write an inequality based on the graph.<\u002Fspan><span class=\"es\">El <em>punto de inflamación<\u002Fem> de la leña es la temperatura más baja a la que se quemará. El punto de inflamación de la leña es de 300°C. Grafica una desigualdad que represente todas las temperaturas a las que la leña se quemará. Escribe una desigualdad basada en la gráfica.<\u002Fspan><\u002Fp>\n            <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">3<\u002Fdiv>\n          <div class=\"body\">\n            <p><span class=\"en\">Darius is making an animated film of “To Build a Fire” and needs to plot precisely where the man will walk. He draws a map of the scene on a coordinate plane with distances marked in miles. The man in the story starts at (0.2, 0). He walks north to (0.2, 0.3). Then he walks west to (−0.1, 0.3), where he falls through the ice. He recovers, walks to (−0.1, 0.4), and makes a fire. What is the total distance the man walks?<\u002Fspan><span class=\"es\">Darius está haciendo una película animada de “To Build a Fire” y necesita ubicar con precisión dónde caminará el hombre. Dibuja un mapa de la escena en un plano de coordenadas con las distancias marcadas en millas. El hombre del cuento comienza en (0.2, 0). Camina al norte hasta (0.2, 0.3). Luego camina al oeste hasta (−0.1, 0.3), donde cae a través del hielo. Se recupera, camina hasta (−0.1, 0.4) y enciende un fuego. ¿Cuál es la distancia total que camina el hombre?<\u002Fspan><\u002Fp>\n            <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv><!-- /wrap -->\n\n  <!-- ===================== PACER DOCK ===================== -->\n  <div class=\"pacedock\" aria-label=\"Reading pacer controls\">\n    <button id=\"pprev\" onclick=\"pacePrev()\" aria-label=\"Previous sentence\">‹<\u002Fbutton>\n    <span class=\"pcount\" id=\"pcount\">1 / 1<\u002Fspan>\n    <button id=\"pnext\" class=\"main\" onclick=\"paceNext()\" aria-label=\"Next sentence\">›<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ===================== VOCAB POPOVER ===================== -->\n  <div class=\"pop\" id=\"pop\"><\u002Fdiv>\n\n  <!-- ===================== IMAGE LIGHTBOX ===================== -->\n  <div class=\"lightbox\" id=\"lightbox\" onclick=\"if(event.target===this)closeLight()\">\n    <figure class=\"lightcard\">\n      <button class=\"lightclose\" onclick=\"closeLight()\" aria-label=\"Close\">✕<\u002Fbutton>\n      <img id=\"lightimg\" alt=\"\">\n      <figcaption id=\"lightcap\"><\u002Ffigcaption>\n    <\u002Ffigure>\n  <\u002Fdiv>\n\n<script>\n/* ===================== VOCABULARY GLOSSARY ===================== */\nvar GLOSS={};\n\n/* ===================== PASSAGES ===================== */\nvar PASSAGES=[\n  {en:'Reading: To Build a Fire', es:'Lectura: To Build a Fire'},\n  {en:'Math Connection',    es:'Conexión matemática'}\n];\nvar ACTIVE=0;\n\n/* ===================== STATE ===================== */\nvar lang='en';\nvar pacerOn=false;\nvar idx=0;\nvar sentences=[];\n\n/* ===================== PASSAGE SWITCHING ===================== */\nfunction updatePsgName(){\n  var p=PASSAGES[ACTIVE];\n  document.getElementById('psgname').innerHTML=\n    '<span class=\"en\">'+p.en+'<\u002Fspan><span class=\"es\">'+p.es+'<\u002Fspan>'+\n    '<span class=\"pos\">'+(ACTIVE+1)+' / '+PASSAGES.length+'<\u002Fspan>';\n  document.getElementById('psgprev').disabled = ACTIVE===0;\n  document.getElementById('psgnext').disabled = ACTIVE===PASSAGES.length-1;\n}\nfunction setPassage(i){\n  if(i<0||i>=PASSAGES.length) return;\n  ACTIVE=i;\n  var secs=document.querySelectorAll('.psg');\n  for(var k=0;k<secs.length;k++){ secs[k].classList.toggle('active',k===i); }\n  document.querySelectorAll('.psg.active .para').forEach(function(el){el.classList.add('show');});\n  hidePop();\n  updatePsgName();\n  syncPacerAvailability();\n  window.scrollTo({top:0,behavior:'auto'});\n  if(pacerOn){ rebuildSentences(); idx=0; applyPace(); }\n  else { document.querySelectorAll('.s').forEach(function(s){s.classList.remove('active','done');}); }\n}\n\n/* hide the Reading Pacer on passages that have no prose to pace (e.g. Math Connection) */\nfunction activeHasSentences(){\n  return document.querySelectorAll('.psg.active .para .body > .en > .s, .psg.active .para .body > .es > .s').length>0;\n}\nfunction syncPacerAvailability(){\n  var btn=document.getElementById('pacertoggle');\n  if(!btn) return;\n  if(activeHasSentences()){\n    btn.style.display='';\n  }else{\n    if(pacerOn) togglePacer();   // turn it off before hiding\n    btn.style.display='none';\n  }\n}\nfunction nextPassage(){ setPassage(ACTIVE+1); }\nfunction prevPassage(){ setPassage(ACTIVE-1); }\n\n/* ===================== LANGUAGE ===================== */\nfunction setLang(l){\n  lang=l;\n  document.body.classList.toggle('lang-es',l==='es');\n  document.body.classList.toggle('lang-en',l!=='es');\n  document.getElementById('btn-en').classList.toggle('on',l==='en');\n  document.getElementById('btn-es').classList.toggle('on',l==='es');\n  updatePsgName();\n  updateLightCaption();\n  hidePop();\n  if(pacerOn){ rebuildSentences(); idx=Math.min(idx,sentences.length-1); applyPace(); }\n}\n\n/* ===================== READING PACER ===================== */\nfunction rebuildSentences(){\n  var langSel = lang==='es' ? '.es' : '.en';\n  sentences = Array.prototype.slice.call(document.querySelectorAll('.psg.active .para .body '+langSel+' > .s'));\n  document.querySelectorAll('.s').forEach(function(s){s.classList.remove('active','done');});\n}\n\nfunction togglePacer(){\n  pacerOn=!pacerOn;\n  document.body.classList.toggle('pacer',pacerOn);\n  var tb=document.getElementById('pacertoggle');\n  if(pacerOn){\n    tb.classList.remove('off');\n    tb.innerHTML='■ <span class=\"en\">Pacer: ON<\u002Fspan><span class=\"es\">Marcapasos: SÍ<\u002Fspan>';\n    document.querySelectorAll('.psg.active .para').forEach(function(el){el.classList.add('show');});\n    rebuildSentences(); idx=0; applyPace();\n  }else{\n    tb.classList.add('off');\n    tb.innerHTML='▸ <span class=\"en\">Reading Pacer<\u002Fspan><span class=\"es\">Marcapasos<\u002Fspan>';\n    document.querySelectorAll('.s').forEach(function(s){s.classList.remove('active','done');});\n  }\n}\n\nfunction applyPace(){\n  sentences.forEach(function(s,i){\n    s.classList.remove('active','done');\n    if(i<idx) s.classList.add('done');\n    if(i===idx) s.classList.add('active');\n  });\n  var cur=sentences[idx];\n  if(cur){\n    var r=cur.getBoundingClientRect();\n    var mid=window.innerHeight*0.42;\n    window.scrollBy({top:r.top-mid,behavior:'smooth'});\n  }\n  document.getElementById('pcount').textContent=(idx+1)+' / '+sentences.length;\n  document.getElementById('pprev').style.opacity = idx===0 ? '.35' : '1';\n  document.getElementById('pnext').style.opacity = idx>=sentences.length-1 ? '.35' : '1';\n}\nfunction paceNext(){ if(idx<sentences.length-1){idx++;applyPace();} }\nfunction pacePrev(){ if(idx>0){idx--;applyPace();} }\n\ndocument.addEventListener('keydown',function(e){\n  if(!pacerOn)return;\n  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){e.preventDefault();paceNext();}\n  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();pacePrev();}\n});\n\n/* ===================== REVEAL ON SCROLL ===================== */\nvar io=new IntersectionObserver(function(es){\n  es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('show'); io.unobserve(e.target);} });\n},{threshold:.18});\ndocument.querySelectorAll('.psg.active .para').forEach(function(el){io.observe(el);});\n\n/* ===================== PROGRESS BAR ===================== */\nwindow.addEventListener('scroll',function(){\n  var h=document.documentElement;\n  var pct=(h.scrollTop)/(h.scrollHeight-h.clientHeight)*100;\n  document.getElementById('prog').style.width=Math.min(100,pct)+'%';\n});\n\n/* ===================== VOCAB POPOVER ===================== */\nvar pop=document.getElementById('pop');\nfunction hidePop(){pop.style.display='none';}\nfunction showPop(el){\n  var key=el.getAttribute('data-k'); var g=GLOSS[key]; if(!g)return;\n  var d=g[lang];\n  pop.innerHTML='<span class=\"x\" onclick=\"hidePop()\">✕<\u002Fspan><div class=\"word\">'+d.w+'<\u002Fdiv>'+d.d;\n  pop.style.display='block';\n  var r=el.getBoundingClientRect();\n  var pw=pop.offsetWidth, ph=pop.offsetHeight;\n  var left=Math.min(window.innerWidth-pw-14, Math.max(14, r.left));\n  var top=r.bottom+10; if(top+ph>window.innerHeight){top=r.top-ph-10;}\n  pop.style.left=(left+window.scrollX)+'px'; pop.style.top=(top+window.scrollY)+'px';\n}\ndocument.addEventListener('click',function(e){\n  var t=e.target.closest('.term');\n  if(t){e.stopPropagation();showPop(t);}\n  else if(!e.target.closest('.pop')){hidePop();}\n});\ndocument.addEventListener('keydown',function(e){\n  if((e.key==='Enter'||e.key===' ')&&document.activeElement&&document.activeElement.classList.contains('term')){\n    e.preventDefault();showPop(document.activeElement);\n  }\n});\nwindow.addEventListener('scroll',hidePop);\n\n/* ===================== IMAGE LIGHTBOX ===================== */\nfunction openLight(fig){\n  var img=fig.querySelector('img'); if(!img)return;\n  var lb=document.getElementById('lightbox');\n  document.getElementById('lightimg').src=img.getAttribute('src');\n  document.getElementById('lightimg').alt=img.getAttribute('alt')||'';\n  lb.dataset.capEn=img.getAttribute('data-cap-en')||'';\n  lb.dataset.capEs=img.getAttribute('data-cap-es')||'';\n  updateLightCaption();\n  lb.classList.add('open');\n}\nfunction updateLightCaption(){\n  var lb=document.getElementById('lightbox');\n  document.getElementById('lightcap').textContent = lang==='es' ? (lb.dataset.capEs||'') : (lb.dataset.capEn||'');\n}\nfunction closeLight(){ document.getElementById('lightbox').classList.remove('open'); }\ndocument.addEventListener('keydown',function(e){\n  if(e.key==='Escape') closeLight();\n  if((e.key==='Enter'||e.key===' ')&&document.activeElement&&document.activeElement.classList.contains('figure')){\n    e.preventDefault();openLight(document.activeElement);\n  }\n});\n\n/* ===================== INIT ===================== */\nupdatePsgName();\nsyncPacerAvailability();\n<\u002Fscript>\n<script>\n(function(){\n  window.toggleLOSC=function(){\n    var p=document.getElementById('loscPop'),b=document.getElementById('loscPill');\n    if(!p)return; var o=p.classList.toggle('open'); if(b){b.classList.toggle('open',o);b.setAttribute('aria-expanded',o);}\n  };\n  document.addEventListener('click',function(e){\n    var p=document.getElementById('loscPop'); if(!p||!p.classList.contains('open'))return;\n    if(!p.contains(e.target)&&!e.target.closest('.losc-pill')){p.classList.remove('open');var b=document.getElementById('loscPill');if(b){b.classList.remove('open');b.setAttribute('aria-expanded','false');}}\n  });\n  document.querySelectorAll('.losc-ed[id]').forEach(function(el){\n    try{var v=localStorage.getItem(el.id); if(v!=null) el.innerHTML=v;}catch(e){}\n    el.addEventListener('input',function(){try{localStorage.setItem(el.id,el.innerHTML);}catch(e){}});\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
